version: 2

models:
  - name: stg_tests
    description: "Both years of MOT test records unioned and typed."
    columns:
      - name: vehicle_id
        description: "Anonymised persistent vehicle identifier (stable across annual releases)."
        tests:
          - not_null

  - name: int_mileage_seq
    description: "Consecutive test pairs per vehicle, with mileage delta derived via LAG."
    columns:
      - name: vehicle_id
        tests:
          - not_null
      - name: prev_mileage
        description: "Previous test's mileage for the same vehicle."
        tests:
          - not_null

  - name: int_clocking_events
    description: "Mileage drops surviving all data-quality filters: credible clocking candidates."
    columns:
      - name: mileage_delta
        description: "Change in mileage between consecutive tests. Always negative in this model."
        tests:
          - not_null

  - name: mart_vehicle_risk
    description: "Final scored table ranking vehicles by clocking risk."
    columns:
      - name: vehicle_id
        tests:
          - not_null
      - name: risk_score
        description: "Transparent rules-based risk score, 0-100."
        tests:
          - not_null
